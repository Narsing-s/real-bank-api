<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Bank Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
color:#00d4ff;
}

.card{
background:#131c31;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,212,255,.2);
}

h2{
margin-bottom:15px;
color:#00d4ff;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
padding:10px 20px;
background:#00d4ff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00b7dd;
}

pre{
background:#000;
padding:15px;
border-radius:10px;
overflow:auto;
margin-top:15px;
white-space:pre-wrap;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🏦 Real Bank Management Portal</h1>

<div class="grid">

<!-- CREATE ACCOUNT -->
<div class="card">
<h2>Create Account</h2>

<input id="fullName" placeholder="Full Name">
<input id="mobileNumber" placeholder="Mobile Number">
<input id="email" placeholder="Email">
<input id="dob" placeholder="Date Of Birth">
<input id="address" placeholder="Address">

<input id="adharNumber" placeholder="Aadhar Number">
<input id="bankName" placeholder="Bank Name">

<button onclick="createAccount()">Create Account</button>
</div>

<!-- GET ACCOUNT -->
<div class="card">
<h2>Get Account</h2>

<input id="getAccNo" placeholder="Account Number">

<button onclick="getAccount()">Get Account</button>
</div>

<!-- GET BY STATUS -->
<div class="card">
<h2>Get Accounts By Status</h2>

<select id="status">
<option value="ACTIVE">ACTIVE</option>
<option value="INACTIVE">INACTIVE</option>
</select>

<button onclick="getByStatus()">Search</button>
</div>

<!-- UPDATE ACCOUNT -->
<div class="card">
<h2>Update Account</h2>

<input id="updateAccNo" placeholder="Account Number">
<input id="updateName" placeholder="Full Name">
<input id="updateMobile" placeholder="Mobile Number">
<input id="updateAddress" placeholder="Address">

<button onclick="updateAccount()">Update</button>
</div>

<!-- DELETE ACCOUNT -->
<div class="card">
<h2>Delete Account</h2>

<input id="deleteAccNo" placeholder="Account Number">

<button onclick="deleteAccount()">Delete</button>
</div>

<!-- TRANSACTIONS -->
<div class="card">
<h2>Transactions</h2>

<input id="txnAccNo" placeholder="Account Number">

<button onclick="getTransactions()">Get Transactions</button>
</div>

</div>

<div class="card">
<h2>API Response</h2>
<pre id="response">Response will appear here...</pre>
</div>

</div>

<script>

const BASE_URL = "http://localhost:8081/api";

function show(data){
document.getElementById("response").textContent =
JSON.stringify(data,null,2);
}

async function createAccount(){

const body = {
FullName: document.getElementById("fullName").value,
mobileNumber: document.getElementById("mobileNumber").value,
email: document.getElementById("email").value,
dateOfBirth: document.getElementById("dob").value,
address: document.getElementById("address").value
};

const adharNumber =
document.getElementById("adharNumber").value;

const bankName =
document.getElementById("bankName").value;

const res = await fetch(
`${BASE_URL}/accounts?adharNumber=${adharNumber}&bankName=${bankName}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(body)
});

show(await res.json());
}

async function getAccount(){

const acc =
document.getElementById("getAccNo").value;

const res = await fetch(
`${BASE_URL}/accounts/${acc}`
);

show(await res.json());
}

async function getByStatus(){

const status =
document.getElementById("status").value;

const res = await fetch(
`${BASE_URL}/accounts?status=${status}`
);

show(await res.json());
}

async function updateAccount(){

const acc =
document.getElementById("updateAccNo").value;

const body = {
FullName: document.getElementById("updateName").value,
mobileNumber: document.getElementById("updateMobile").value,
address: document.getElementById("updateAddress").value
};

const res = await fetch(
`${BASE_URL}/accounts/${acc}`,
{
method:"PATCH",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(body)
});

show(await res.json());
}

async function deleteAccount(){

const acc =
document.getElementById("deleteAccNo").value;

const res = await fetch(
`${BASE_URL}/accounts/${acc}`,
{
method:"DELETE"
});

show(await res.json());
}

async function getTransactions(){

const acc =
document.getElementById("txnAccNo").value;

const res = await fetch(
`${BASE_URL}/accounts/${acc}/transactions`
);

show(await res.json());
}

</script>

</body>
</html>
